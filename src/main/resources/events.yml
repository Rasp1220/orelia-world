# Event definitions (SOW EventModule). recurring: true uses a year-agnostic month/day
# window (start/end as --MM-DD, MonthDay.parse format) and repeats every year - typical for
# SEASONAL events. recurring: false uses an explicit one-off ISO-8601 start/end - typical
# for LIMITED events.
config-version: 1

events:
  halloween:
    name: "ハロウィンイベント"
    type: SEASONAL
    recurring: true
    start: "--10-25"
    end: "--10-31"
    bonus-exp-multiplier: 1.2
    bonus-money-multiplier: 1.2
    announce-message: "&%6&lハロウィンイベントが始まりました！"

  christmas:
    name: "クリスマスイベント"
    type: SEASONAL
    recurring: true
    start: "--12-20"
    end: "--12-26"
    bonus-exp-multiplier: 1.3
    bonus-money-multiplier: 1.3
    announce-message: "&%c&lクリスマスイベントが始まりました！"

  anniversary_2026:
    name: "周年記念イベント"
    type: LIMITED
    recurring: false
    start: "2026-07-01T00:00:00"
    end: "2026-07-14T23:59:59"
    bonus-exp-multiplier: 1.5
    bonus-money-multiplier: 1.5
    announce-message: "&%d&l周年記念イベントが始まりました！"
