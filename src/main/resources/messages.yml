# Centralized user-facing text. Every chat message the plugin sends goes through
# rpg.core.message.MessageManager (reused from orelia-core), keyed by the dotted paths
# below - do not hardcode ChatColor + literal strings in command/listener/gui code, add a
# key here instead. NPC dialogue lines / quest descriptions / story text stay in their own
# content yml files (npc.yml, quests.yml, story.yml, ...) since those are per-entry authored
# content, not fixed UI copy.
#
# config-version tracks this file's schema. Bump it whenever a new top-level section is
# added - on next startup, ConfigManager appends the new section (with its comments) to any
# existing messages.yml that's missing it, without touching anything you've already customized.
config-version: 2

prefix: "&%8[&%6Orelia&%8] &r"

command:
  player-only: "&%cプレイヤーのみ実行できます。"

quest:
  data-not-loaded: "&%cクエストデータがまだ読み込まれていません。"
  abandoned: "&%eクエスト「{quest}」を放棄しました。"
  not-active: "&%cそのクエストは受注していません。"
  no-active: "&%e受注中のクエストはありません。"
  active-header: "&%a受注中のクエスト:"
  active-entry: "&%7- {quest} &%f[{state}]"
  objective-line: "&%7  {type} {target}: {bar} &%f{current}/{max}"
  accepted: "&%aクエストを受注しました。"
  requirements-not-met: "&%c受注条件を満たしていません: {reason}"
  on-cooldown: "&%cこのクエストはクールダウン中です。残り {hours}時間{minutes}分。"
  newly-unlocked: "&%a新しいクエストが解放されました: {quest}"
  completed: "&%aクエストを完了しました！"
  report-failed: "&%c報告に失敗しました。"
  in-progress: "&%eこのクエストは進行中です。"

title:
  usage: "&%e使い方: /title &%7<&%elist&%7|&%eequip &%7<&%etitle&%7>&%e&%7|&%eunequip&%7>&%e"
  no-titles: "&%eまだ称号を獲得していません。"
  list-header: "&%a獲得済みの称号:"
  list-entry: "&%7- {title}{equipped}"
  equipped-tag: "&%6 [装備中]"
  equipped: "&%a称号「{title}」を装備しました。"
  unequipped: "&%a称号を外しました。"
  not-earned: "&%cその称号はまだ獲得していません。"

